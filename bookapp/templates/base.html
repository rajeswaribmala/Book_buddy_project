{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>BookBuddy</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        body {
            background-image: url("{% static 'images/background.jpg' %}");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <!-- Header Bar -->
    <header>
        <div class="header-bar">
            <div class="title-left">
                <h2>📚 BookBuddy</h2>
            </div>

            <!-- Navigation Links on the Right -->
            <nav class="nav-right">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'about' %}">About</a>
                {% if not user.is_authenticated %}
                    <a href="{% url 'login' %}">User Login</a>
                    <a href="{% url 'register' %}">User Register</a>
                {% endif %}
                <a href="/admin/">Admin Login</a>
            </nav>
        </div>

        <!-- Show search bar only when user is logged in -->
        {% if user.is_authenticated %}
        <div class="search-container">
            <form method="GET" action="{% url 'search_books' %}">
                <input type="text" name="q" placeholder="Search books..." required>
                <button type="submit">Search</button>
            </form>
        </div>
        {% endif %}
    </header>

   

    <!-- Content Block -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 BookBuddy. All rights reserved.</p>
    </footer>
</body>
</html>
